<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#120f66" />
    <title>DaniREM | Sem Internet</title>
    <style>
      :root {
        --bg-1: #120f66;
        --bg-2: #3f2ad6;
        --bg-3: #091570;
        --text-main: #f6f8ff;
        --text-soft: rgba(236, 242, 255, 0.82);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Avenir Next", "Segoe UI", sans-serif;
        color: var(--text-main);
        background: linear-gradient(180deg, var(--bg-2), var(--bg-1) 55%, var(--bg-3));
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(100%, 360px);
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.24);
        background: rgba(255, 255, 255, 0.1);
        padding: 18px 16px;
        text-align: center;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.3rem;
      }

      p {
        margin: 0;
        font-size: 0.95rem;
        line-height: 1.4;
        color: var(--text-soft);
      }

      .hint {
        margin-top: 14px;
        font-size: 0.82rem;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>DaniREM está sem internet no momento</h1>
      <p>Assim que a conexão voltar, os ciclos do sono da Dani voltam a atualizar normalmente.</p>
      <p class="hint">Dica: abra novamente o app em alguns segundos 💙</p>
    </main>
  </body>
</html>
